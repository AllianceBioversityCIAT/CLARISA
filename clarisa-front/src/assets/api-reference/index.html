<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLARISA API Reference</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      /* Hide Scalar's own widgets that don't apply to CLARISA */
      .scalar-mcp-layer,
      .scalar-mcp-layer-link,
      a.scalar-version-number,
      a[href*='scalar.com'],
      /* "Ask AI Agent" button in the code/example panel (persistent, no flicker) */
      .agent-button-container,
      .ask-agent-scalar-input-label {
        display: none !important;
      }
      #loading {
        font-family: system-ui, sans-serif;
        padding: 24px;
        color: #345;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading documentation…</div>
    <!-- Scalar mounts here -->
    <script id="api-reference"></script>

    <script>
      // Back-end spec via query param (?spec=...). Falls back to localhost.
      var params = new URLSearchParams(location.search);
      var specUrl = params.get('spec') || 'http://localhost:3000/api-docs-json';

      /**
       * Turns the raw back-end spec into a CURATED one:
       *  - filters to the endpoints defined in catalog.json
       *  - reassigns each operation to its category (tag)
       *  - builds x-tagGroups for the 2-level hierarchy (group > category)
       * So Scalar shows ONLY the public documentation, grouped like the current
       * docs (One CGIAR Control List > General Control List, etc.).
       */
      function curate(spec, catalog) {
        var newPaths = {};
        var tagDescriptions = {};
        var tagOrder = [];
        var tagGroups = [];

        (catalog.groups || []).forEach(function (group) {
          var groupTags = [];
          (group.categories || []).forEach(function (cat) {
            if (!(cat.name in tagDescriptions)) {
              tagDescriptions[cat.name] = cat.description || '';
              tagOrder.push(cat.name);
            }
            groupTags.push(cat.name);

            (cat.endpoints || []).forEach(function (ep) {
              var p = '/' + String(ep.route).replace(/^\/+/, '');
              var m = (ep.method || 'get').toLowerCase();
              if (spec.paths && spec.paths[p] && spec.paths[p][m]) {
                if (!newPaths[p]) newPaths[p] = {};
                if (!newPaths[p][m]) {
                  var op = JSON.parse(JSON.stringify(spec.paths[p][m]));
                  op.tags = [];
                  op.summary = op.summary || ep.name;
                  newPaths[p][m] = op;
                }
                // an endpoint may live in several categories (multi-tag)
                if (newPaths[p][m].tags.indexOf(cat.name) === -1) {
                  newPaths[p][m].tags.push(cat.name);
                }
              }
            });
          });
          tagGroups.push({ name: group.group, tags: groupTags });
        });

        var tags = tagOrder.map(function (name) {
          return { name: name, description: tagDescriptions[name] };
        });

        var out = JSON.parse(JSON.stringify(spec));
        out.paths = newPaths;
        out.tags = tags;
        out['x-tagGroups'] = tagGroups;
        return out;
      }

      // Hide Scalar widgets with no value here: "Ask AI" / "Test Request".
      // These have no stable config flag, so we hide them by text as they render.
      function hideExtraWidgets() {
        document.querySelectorAll('button, a').forEach(function (n) {
          var t = (n.textContent || '').replace(/\s+/g, ' ').trim();
          if (/ask ai/i.test(t) || /^test request$/i.test(t)) {
            n.style.display = 'none';
          }
        });
      }

      (function () {
        Promise.all([
          fetch(specUrl).then(function (r) { return r.json(); }),
          fetch('catalog.json').then(function (r) { return r.json(); }),
        ])
          .then(function (res) {
            var curated = curate(res[0], res[1]);
            var loaded = Object.keys(curated.paths).length;

            var el = document.getElementById('api-reference');
            el.dataset.configuration = JSON.stringify({
              content: curated,
              theme: 'default',
              hideClientButton: true,
              hideModels: true,
              hideTestRequestButton: true,
              showDeveloperTools: 'never',
              mcp: { disabled: true },
            });

            var loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.remove();

            new MutationObserver(hideExtraWidgets).observe(document.body, {
              childList: true,
              subtree: true,
            });
            setInterval(hideExtraWidgets, 400);

            // Scalar pinned to an exact version (no floating "latest") to avoid
            // supply-chain drift and surprise breakages from CDN updates.
            var cdn = document.createElement('script');
            cdn.src =
              'https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.57.5';
            document.body.appendChild(cdn);

            console.log('[api-reference] curated:', loaded, 'public endpoints');
          })
          .catch(function (err) {
            var loadingEl = document.getElementById('loading');
            if (loadingEl)
              loadingEl.textContent = 'Could not load the documentation: ' + err;
          });
      })();
    </script>
  </body>
</html>
